name: Android Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Fix Deprecated configs in react-native-image-to-pdf
        run: |
          sed -i 's/jcenter()/mavenCentral()/g' node_modules/react-native-image-to-pdf/android/build.gradle
          sed -i 's/compileSdkVersion 28/compileSdkVersion 34/g' node_modules/react-native-image-to-pdf/android/build.gradle
          sed -i 's/buildToolsVersion "28.0.3"/buildToolsVersion "34.0.0"/g' node_modules/react-native-image-to-pdf/android/build.gradle
          sed -i 's/targetSdkVersion 28/targetSdkVersion 34/g' node_modules/react-native-image-to-pdf/android/build.gradle

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build Android Release APK
        run: cd android && ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: UniversalFileViewer-APK
          path: android/app/build/outputs/apk/release/app-release.apk
